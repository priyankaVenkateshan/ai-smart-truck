services:
  - type: web
    name: fleetOS-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleetOS-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: fleetOS-db
    databaseName: fleetdb
    user: fleetuser
