services:
  postgres:
    image: postgres:16
    container_name: ai_smart_truck_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_smart_truck
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_smart_truck"]
      interval: 5s
      timeout: 5s
      retries: 20
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.1
    container_name: ai_smart_truck_mlflow
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlruns
    entrypoint: ["sh", "-c", "pip install psycopg2-binary -q && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://postgres:postgres@postgres:5432/ai_smart_truck --default-artifact-root /mlruns"]

volumes:
  postgres_data:
  mlflow_data:
